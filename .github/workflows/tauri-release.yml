name: Tauri Release (Windows)

# Produces the NSIS installer and publishes it to a GitHub Release.
# Triggered by pushing a `tauri-v*` tag, or manually via workflow_dispatch.
on:
  push:
    tags:
      - 'tauri-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: 'tauri-v__VERSION__'
          releaseName: 'BT 聚合搜索 (Tauri) v__VERSION__'
          releaseBody: 'Tauri 实验分支构建的 Windows 安装包。'
          releaseDraft: true
          prerelease: false
          args: ''
